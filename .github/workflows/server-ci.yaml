name: Server CI

on:
  push:
    branches: [main]
    paths:
      - "server/**"

jobs:
  build-and-push:
    runs-on: ubuntu-latest    # 👈 GitHub cloud runner, self-hosted නෙවෙයි

    env:
      IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/student-mgmt-server

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        working-directory: ./server
        run: npm ci

      - name: Run tests (තියෙනවා නම්)
        working-directory: ./server
        run: npm test --if-present

      - name: Generate image tag
        id: vars
        run: echo "TAG=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./server
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ steps.vars.outputs.TAG }}
            ${{ env.IMAGE_NAME }}:latest

      - name: Update K8s manifest with new image tag
        run: |
          sed -i "s|image: .*student-mgmt-server:.*|image: ${{ env.IMAGE_NAME }}:${{ steps.vars.outputs.TAG }}|" k8s/base/server-deployment.yaml
          
      - name: Commit updated manifest
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/base/server-deployment.yaml
          git commit -m "ci: update server image to ${{ steps.vars.outputs.TAG }}" || echo "No changes"
          git push