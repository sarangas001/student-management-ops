name: Student Management System CI

on:
  workflow_dispatch:
  push:
    branches:
      - main # main branch push
    

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Log in to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_PASSWORD }}

    # 1. Backend Image එක Build කරලා Push කිරීම
    - name: Build and Push Backend
      uses: docker/build-push-action@v4
      with:
        context: ./server
        push: true
        tags: ${{ secrets.DOCKERHUB_USERNAME }}/sms-server:latest

    # 2. Frontend Image එක Build කරලා Push කිරීම
    - name: Build and Push Frontend
      uses: docker/build-push-action@v4
      with:
        context: ./client
        push: true
        tags: ${{ secrets.DOCKERHUB_USERNAME }}/sms-client:latest