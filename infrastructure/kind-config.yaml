kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: student-mgmt-cluster

nodes:
  - role: control-plane
    kubeadmConfigPatches:
      - |
        kind: InitConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "ingress-ready=true"
    extraPortMappings:
      # Ingress Controller සඳහා (Step 14) — host port 80/443 → cluster port
      - containerPort: 80
        hostPort: 80
        protocol: TCP
      - containerPort: 443
        hostPort: 443
        protocol: TCP

  - role: worker

containerdConfigPatches:
  # MiniStack ECR එකට insecure registry විදිහට trust කරන්න
  - |-
    [plugins."io.containerd.grpc.v1.cri".registry.mirrors."host.docker.internal:4566"]
      endpoint = ["http://host.docker.internal:4566"]