apiVersion: apps/v1
kind: Deployment
metadata:
  name: sms-backend
  namespace: student-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sms-backend
  template:
    metadata:
      labels:
        app: sms-backend
    spec:
      containers:
      - name: backend
        image: sarangasl/sms-server:latest 
        ports:
        - containerPort: 5000
---
apiVersion: v1
kind: Service
metadata:
  name: sms-backend-service
  namespace: student-app
spec:
  selector:
    app: sms-backend
  ports:
    - protocol: TCP
      port: 5000
      targetPort: 5000